services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./frontend/dist:/var/www/frontend
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    build: ./docker/php
    volumes:
      - ./backend:/var/www
    working_dir: /var/www
    env_file:
      - ./backend/.env
    command: sh -c "until nc -z db 3306; do echo waiting for db; sleep 2; done && php artisan config:clear && php artisan migrate --force && php-fpm"
    restart: unless-stopped

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "0.0.0.0:5173:5173"
    restart: unless-stopped

volumes:
  dbdata:

