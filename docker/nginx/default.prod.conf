server {
    listen 80;
    server_name _;

    # Laravel API
    location /api {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Sanctum CSRF endpoint
    location /sanctum {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel account session endpoints
    location /accounts {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel signup endpoint
    location /users {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel movie search endpoints
    location /movies {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel reviews endpoints
    location /reviews {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        root /var/www/public;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    location ~ \.php$ {
        return 404;
    }

    # Vue.js SPA — statisch aus dist-Verzeichnis servieren
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
