server {
    listen 80;
    root /var/www/public;
    index index.php index.html;

    # Laravel API
    location /api {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Sanctum CSRF endpoint for SPA cookie auth handshake
    location /sanctum {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel account session endpoints (used by frontend store without /api prefix)
    location /accounts {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel signup endpoint (used by frontend store without /api prefix)
    location /users {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel movie search endpoints
    location /movies {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    # Laravel reviews endpoints
    location /reviews {
        root /var/www/public;
        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        root /var/www/public;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    location ~ \.php$ {
        return 404;
    }

    # Vue.js App (dev server proxy)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

