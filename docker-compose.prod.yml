services:
  nginx:
    image: nginx:alpine
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./backend:/var/www
      - ./frontend/dist:/var/www/frontend
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    build: ./docker/php
    volumes:
      - ./backend:/var/www
    working_dir: /var/www
    env_file:
      - ./backend/.env.prod
    command: sh -c "php artisan config:clear && php artisan migrate --force && php-fpm"
    restart: unless-stopped

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  dbdata:
